about_content: |
  **7년차 Android 개발자** 이성광입니다.

  6,000여 개 뷰티샵 · 월 60만 건 예약을 처리하는 B2B SaaS CRM **공비서**의 Android를 4년 이상 담당하며,
  1인 체제에서 팀을 만들고 아키텍처를 바꾸고 AI로 개발 방식을 바꿔왔습니다.

  기술적 판단이 필요한 순간마다 대안을 비교하고, 실패를 통해 구조를 개선하며,
  팀이 활용할 수 있는 시스템을 구축해왔습니다.

  '왜'라는 질문을 통해 모든 결정의 근거를 명확히 하고,
  다음 사람이 이어받을 수 있는 구조를 만드는 것이 제 기준입니다.

